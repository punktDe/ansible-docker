  ## Installation
  Add this role to the requirements.yml of your playbook as follows:
  ```yaml
  roles:
    - name: {{ role }}
      src: https://github.com/punktDe/ansible-docker
  ```

  Afterwards, install the role by running `ansible-galaxy install -r requirements.yml`

  ## Example Playbook

  ```yaml
  - hosts: all
    roles:
      - name: docker
  ```

